<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FSR Mini Pad Overlay v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  body.settings-open {
    background: #0d0d0d !important;
  }

  /* ── Settings mode wrapper ── */
  #settings-mode {
    display: none;
    width: 100%;
    background: #0d0d0d;
    min-height: 100vh;
  }
  #settings-mode.visible { display: flex; flex-direction: row; align-items: flex-start; }

  /* ── Left: controls ── */
  #settings-ui {
    width: 360px;
    flex-shrink: 0;
    background: #111;
    padding: 20px;
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 100vh;
  }

  #settings-ui h2 {
    color: #aaa;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 6px 10px;
  }

  .color-row label {
    color: #888;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex: 1;
  }

  .color-row input[type="color"] {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 4px;
    padding: 0;
    cursor: pointer;
    background: none;
  }
  .color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

  .settings-hint {
    color: #444;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-align: center;
  }

  .section-divider { border: none; border-top: 1px solid #222; margin: 14px 0; }

  .map-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 6px;
    transition: border-color 0.15s, background 0.15s;
  }
  .map-row.listening { border-color: #33aaff; background: #0a1520; }
  .map-row label { color: #888; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; flex: 1; }
  .map-status { font-size: 11px; color: #555; min-width: 60px; text-align: right; }
  .map-row.listening .map-status { color: #33aaff; }
  .map-btn {
    background: #222; border: 1px solid #333; border-radius: 4px;
    color: #777; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 8px; cursor: pointer; transition: background 0.1s, color 0.1s;
  }
  .map-btn:hover { background: #2a2a2a; color: #aaa; }

  .action-btn {
    flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #333;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: background 0.1s, color 0.1s;
  }
  .save-btn  { background: #1a2a1a; color: #4caf50; border-color: #2a4a2a; }
  .save-btn:hover  { background: #223322; }
  .reset-btn { background: #2a1a1a; color: #888; border-color: #3a2a2a; }
  .reset-btn:hover { background: #331a1a; color: #aaa; }

  .theme-btn { background: #1a1a2a; color: #888; border-color: #2a2a3a; }
  .theme-btn:hover { background: #22223a; color: #aaa; }

  .credit-link {
    display: block; text-align: center;
    color: #444; font-size: 11px; letter-spacing: 0.06em;
    text-decoration: none; transition: color 0.15s;
  }
  .credit-link:hover { color: #888; }

  /* ── Light mode ── */
  body.light #settings-mode    { background: #f0f0f0; }
  body.light #settings-ui      { background: #e4e4e4; border-right-color: #ccc; }
  body.light #settings-ui h2   { color: #555; }
  body.light .section-divider  { border-color: #ccc; }
  body.light .settings-hint    { color: #999; }
  body.light .color-row        { background: #d8d8d8; border-color: #ccc; }
  body.light .color-row label  { color: #444; }
  body.light .map-row          { background: #d8d8d8; border-color: #ccc; }
  body.light .map-row label    { color: #444; }
  body.light .map-status       { color: #888; }
  body.light .map-btn          { background: #ccc; border-color: #bbb; color: #555; }
  body.light .map-btn:hover    { background: #bbb; color: #333; }
  body.light .map-row.listening { border-color: #0066cc; background: #ddeeff; }
  body.light .map-row.listening .map-status { color: #0066cc; }
  body.light .save-btn         { background: #d4edda; color: #2e7d32; border-color: #a5d6a7; }
  body.light .save-btn:hover   { background: #c3e6cb; }
  body.light .reset-btn        { background: #f0e0e0; color: #666; border-color: #e0c0c0; }
  body.light .reset-btn:hover  { background: #e8d0d0; color: #444; }
  body.light .theme-btn        { background: #dde; color: #556; border-color: #bbc; }
  body.light .theme-btn:hover  { background: #ccd; color: #334; }
  body.light .credit-link      { color: #aaa; }
  body.light .credit-link:hover { color: #666; }
  body.light #settings-preview { background: #e0e0e0; }

  /* ── Right: preview ── */
  #settings-preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  /* ── Overlay (OBS mode) ── */
  #overlay {
    width: 512px;
    height: 512px;
    position: relative;
  }

  svg { position: absolute; top: 0; left: 0; }
  .po { transition: opacity 0.05s; opacity: 0; }
  .po.on { opacity: 1; }
</style>

  <!-- Left: controls -->
  <div id="settings-ui">
    <h2>Panel Colors</h2>
    <div class="color-grid">
      <div class="color-row">
        <label>↑ Up</label>
        <input type="color" id="color-up" value="#0000FF">
      </div>
      <div class="color-row">
        <label>↓ Down</label>
        <input type="color" id="color-down" value="#0000FF">
      </div>
      <div class="color-row">
        <label>← Left</label>
        <input type="color" id="color-left" value="#FF0000">
      </div>
      <div class="color-row">
        <label>→ Right</label>
        <input type="color" id="color-right" value="#FF0000">
      </div>
    </div>
    <p class="settings-hint">Changes are not saved until you click Save</p>

    <hr class="section-divider">

    <h2>Input Mapping</h2>
    <div id="mapper">
      <div class="map-row" id="map-row-up">
        <label>↑ Up</label>
        <span class="map-status" id="map-status-up">—</span>
        <button class="map-btn" onclick="startListening('up')">Assign</button>
      </div>
      <div class="map-row" id="map-row-down">
        <label>↓ Down</label>
        <span class="map-status" id="map-status-down">—</span>
        <button class="map-btn" onclick="startListening('down')">Assign</button>
      </div>
      <div class="map-row" id="map-row-left">
        <label>← Left</label>
        <span class="map-status" id="map-status-left">—</span>
        <button class="map-btn" onclick="startListening('left')">Assign</button>
      </div>
      <div class="map-row" id="map-row-right">
        <label>→ Right</label>
        <span class="map-status" id="map-status-right">—</span>
        <button class="map-btn" onclick="startListening('right')">Assign</button>
      </div>
    </div>
    <p class="settings-hint" style="margin-top:6px">Click Assign then press the button on your pad</p>

    <hr class="section-divider">

    <div style="display:flex; gap:8px;">
      <button class="action-btn save-btn" onclick="saveAll()">Save</button>
      <button class="action-btn reset-btn" onclick="resetAll()">Reset to defaults</button>
    </div>

    <hr class="section-divider">

    <div style="display:flex; align-items:center; justify-content:space-between;">
      <button class="action-btn theme-btn" id="theme-toggle" onclick="toggleTheme()">☀️ Light mode</button>
    </div>

    <div style="margin-top:auto; padding-top:20px;">
      <a href="https://github.com/playtagg" target="_blank" class="credit-link">Made with ❤️ by playtagg</a>
    </div>
  </div><!-- /settings-ui -->

  <!-- Right: preview -->
  <div id="settings-preview">
    <!-- pad is moved here by JS in settings mode -->
  </div><!-- /settings-preview -->

</div><!-- /settings-mode -->

  <line x1="135" y1="135" x2="377" y2="135" stroke="#777" stroke-width="2"/>
  <line x1="135" y1="377" x2="377" y2="377" stroke="#777" stroke-width="2"/>
  <line x1="135" y1="135" x2="135" y2="377" stroke="#777" stroke-width="2"/>

</div>

<script>
  const PANELS = ['up','down','left','right'];
  const COLOR_KEY = 'fsr_minipad_v2_colors';
  const MAP_KEY   = 'fsr_minipad_v2_mapping';

  const DEFAULTS = {
    colors: { up: '#0000FF', down: '#0000FF', left: '#FF0000', right: '#FF0000' },
    mapping: { up: null, down: null, left: null, right: null },
  };

  const colorInputs = {
    up:    document.getElementById('color-up'),
    down:  document.getElementById('color-down'),
    left:  document.getElementById('color-left'),
    right: document.getElementById('color-right'),
  };

  const svgParts = {
    up:    { bg: 'up-bg',    bloom: 'up-bloom',    pcb: 'up-pcb',    leds: 'up-leds'    },
    down:  { bg: 'down-bg',  bloom: 'down-bloom',  pcb: 'down-pcb',  leds: 'down-leds'  },
    left:  { bg: 'left-bg',  bloom: 'left-bloom',  pcb: 'left-pcb',  leds: 'left-leds'  },
    right: { bg: 'right-bg', bloom: 'right-bloom', pcb: 'right-pcb', leds: 'right-leds' },
  };

  function hexToRgb(hex) {
    return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
  }

  function darkenHex(hex, factor = 0.08) {
    const { r, g, b } = hexToRgb(hex);
    return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
  }

  function applyColor(panel, hex) {
    const p = svgParts[panel];
    document.getElementById(p.bg).setAttribute('fill', hex);
    document.getElementById(p.bloom).setAttribute('fill', hex);
    document.getElementById(p.pcb).setAttribute('fill', darkenHex(hex, 0.08));
    document.getElementById(p.pcb).setAttribute('stroke', hex);
    document.getElementById(p.leds).setAttribute('fill', hex);
  }

  // ── Input mapping ──
  let buttonMap = { up: null, down: null, left: null, right: null };
  let listeningFor = null;

  function updateMapStatus(panel) {
    const el = document.getElementById('map-status-' + panel);
    if (!el) return;
    el.textContent = buttonMap[panel] !== null ? 'B' + buttonMap[panel] : '—';
  }

  function startListening(panel) {
    listeningFor = panel;
    PANELS.forEach(p => document.getElementById('map-row-' + p).classList.toggle('listening', p === panel));
    const el = document.getElementById('map-status-' + panel);
    if (el) el.textContent = 'Press…';
  }

  function stopListening() {
    if (!listeningFor) return;
    document.getElementById('map-row-' + listeningFor).classList.remove('listening');
    listeningFor = null;
  }

  // ── Theme toggle ──
  function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    document.getElementById('theme-toggle').textContent = isLight ? '🌙 Dark mode' : '☀️ Light mode';
    try { localStorage.setItem('fsr_minipad_v2_theme', isLight ? 'light' : 'dark'); } catch(e) {}
  }

  // ── Save / Reset ──
  function saveAll() {
    const colors = {};
    PANELS.forEach(p => colors[p] = colorInputs[p].value);
    try { localStorage.setItem(COLOR_KEY, JSON.stringify(colors)); } catch(e) {}
    try { localStorage.setItem(MAP_KEY, JSON.stringify(buttonMap)); } catch(e) {}
    showToast('Saved! Reload the overlay in OBS to apply.');
  }

  function resetAll() {
    PANELS.forEach(p => {
      colorInputs[p].value = DEFAULTS.colors[p];
      applyColor(p, DEFAULTS.colors[p]);
    });
    PANELS.forEach(p => { buttonMap[p] = null; updateMapStatus(p); });
    try { localStorage.removeItem(COLOR_KEY); } catch(e) {}
    try { localStorage.removeItem(MAP_KEY); } catch(e) {}
    showToast('Reset to defaults.');
  }

  function showToast(msg) {
    let t = document.getElementById('toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast';
      t.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#222;color:#aaa;font-size:11px;letter-spacing:0.06em;padding:8px 16px;border-radius:6px;border:1px solid #333;pointer-events:none;transition:opacity 0.3s;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.style.opacity = '0', 2500);
  }

  // ── Load saved config ──
  function loadSaved() {
    try {
      const rawColors = localStorage.getItem(COLOR_KEY);
      if (rawColors) {
        const data = JSON.parse(rawColors);
        PANELS.forEach(p => { if (data[p]) { colorInputs[p].value = data[p]; applyColor(p, data[p]); } });
      } else {
        PANELS.forEach(p => applyColor(p, DEFAULTS.colors[p]));
      }
    } catch(e) { PANELS.forEach(p => applyColor(p, DEFAULTS.colors[p])); }

    try {
      const rawMap = localStorage.getItem(MAP_KEY);
      if (rawMap) {
        const data = JSON.parse(rawMap);
        PANELS.forEach(p => { buttonMap[p] = data[p] !== undefined ? data[p] : null; });
      }
    } catch(e) {}
    PANELS.forEach(p => updateMapStatus(p));
  }

  // ── Init ──
  PANELS.forEach(p => colorInputs[p].addEventListener('input', () => applyColor(p, colorInputs[p].value)));
  loadSaved();

  // Load saved theme
  try {
    if (localStorage.getItem('fsr_minipad_v2_theme') === 'light') {
      document.body.classList.add('light');
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = '🌙 Dark mode';
    }
  } catch(e) {}

  // ── Show settings UI if ?settings in URL ──
  if (location.search.includes('settings')) {
    document.documentElement.classList.add('settings-open');
    document.body.classList.add('settings-open');
    document.getElementById('settings-mode').classList.add('visible');
    const preview = document.getElementById('settings-preview');
    const overlay = document.getElementById('overlay');
    preview.appendChild(overlay);
  }

  // ── Gamepad tick ──
  const els = {};
  PANELS.forEach(p => els['led-' + p] = document.getElementById('led-' + p));

  function tick() {
    for (const gp of navigator.getGamepads()) {
      if (!gp) continue;
      if (listeningFor) {
        for (let i = 0; i < gp.buttons.length; i++) {
          if (gp.buttons[i].pressed) {
            buttonMap[listeningFor] = i;
            updateMapStatus(listeningFor);
            stopListening();
            break;
          }
        }
      }
      for (const p of PANELS) {
        if (buttonMap[p] === null) { els['led-' + p].classList.remove('on'); continue; }
        const btn = gp.buttons[buttonMap[p]];
        if (btn) els['led-' + p].classList.toggle('on', btn.pressed);
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
</script>
</body>
